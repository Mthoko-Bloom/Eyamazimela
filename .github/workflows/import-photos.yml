name: Cleanup temp branches

on:
  push:
    branches:
      - cleanup-run
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          git push origin --delete photo-import || true
          git push origin --delete import-photos-run || true
          git push origin --delete cleanup-run || true
